name: PR Checks

on:
  pull_request:
    branches: ['main']

permissions:
  contents: read
  actions: read

jobs:
  html:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check root HTML exists
        run: test -f index.html

      - name: Basic HTML sanity check
        run: grep -q '<title>' index.html

  assets:
    name: Validate Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check required assets
        run: |
          test -f assets/css/style.css
          test -f assets/js/main.js
          test -f assets/img/favicon.png
