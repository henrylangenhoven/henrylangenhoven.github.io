name: PR Checks

on:
  pull_request:
    branches: ['main']

permissions:
  contents: read
  actions: read

jobs:
  static-site-checks:
    name: Validate Static Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check required site files
        run: |
          test -f .nojekyll
          test -f index.html
          grep -q '<title>' index.html
          test -f assets/css/style.css
          test -f assets/js/main.js
          test -f assets/img/favicon.png
