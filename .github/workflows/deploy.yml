name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Validate required site files
        run: |
          test -f .nojekyll
          test -f index.html
          test -d assets

      - name: Prepare static site artifact
        run: |
          mkdir _site
          tar \
            --exclude='./.git' \
            --exclude='./.github' \
            --exclude='./.idea' \
            --exclude='./_site' \
            -cf - . | tar -xf - -C _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site


  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
